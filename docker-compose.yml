version: '3.8'

services:
postgres:
	image: postgres:15
	container_name: stock_postgres
	environment:
		POSTGRES_USER: ${POSTGRES_USER:-stockuser}
		POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
		POSTGRES_DB: ${POSTGRES_DB:-stockdb}
	ports:
		- "5432:5432"
	volumes:
		- postgres_data:/var/lib/postgresql/data
		- ./src/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
	healthcheck:
	test: ["CMD-SHELL", "pg_isready -U stockuser -d stockdb"]
		interval: 10s
		timeout: 5s
		retries: 5

mongodb:
	image: mongo:6
	container_name: stock_mongodb
	environment:
		MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-stockuser}
		MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-stockpass}
		MONGO_INITDB_DATABASE: ${MONGO_DB:-stockviz}
	ports:
		- "27017:27017"
	volumes:
		- mongo_data:/data/db
	healthcheck:
		test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
		interval: 10s
		timeout: 5s
		retries: 5

volumes:
postgres_data:
mongo_data: